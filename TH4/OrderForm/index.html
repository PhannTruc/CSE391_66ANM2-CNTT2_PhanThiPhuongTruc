<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đặt Hàng</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Đặt hàng</h2>
    <form id="orderForm"> 
        <label>Tên sản phẩm</label> 
        <select id="product">
            <option value="">-- Chọn sản phẩm --</option>
            <option value="Áo">Áo</option>
            <option value="Quần">Quần</option>
            <option value="Giày">Giày</option>
        </select> 
        <span class="error" id="productError"></span> 

        <label>Số lượng</label> 
        <input type="number"id="quantity"> 
        <span class="error" id="quantityError"></span> 

        <label>Ngày giao hàng</label> 
        <input type="date" id="date"> 
        <span class="error" id="dateError"></span> 

        <label>Địa chỉ giao</label> 
        <input type="text" id="address"> 
        <span class="error" id="addressError"></span>

        <label>Ghi chú</label> 
        <textarea id="note"></textarea>
        <div id="charCount">0/200</div> 
        <span class="error" id="noteError"></span> 

        <label>Phương thức thanh toán</label>
        <label><input type="radio" name="pay" value="COD"> COD</label> 
        <label><input type="radio" name="pay" value="Bank"> Chuyển khoản</label> 
        <label><input type="radio" name="pay" value="Wallet"> Ví điện tử</label> 

        <span class="error" id="payError"></span>
        <div class="total"> Tổng tiền: <span id="totalPrice">0</span> VNĐ </div> 
        <button type="submit">Đặt hàng</button>
    </form>
    <div id="confirmBox"></div>
    <div id="success"></div>
    <script src="script.js"></script>
</body>

</html>
